# Site: kaynos-site (Foggy Clouds). Custom domain: www.kaynos.net (+ alias kaynos.net).
# DNS lives in the Netlify DNS zone for kaynos.net (NETLIFY records to kaynos-site.netlify.app).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "https://kaynos.net/*"
  to = "https://www.kaynos.net/:splat"
  status = 301
  force = true

# /docs paths exist as React Router client-side <Navigate> redirects in App.jsx;
# mirror them server-side so direct hits 301 instead of relying on SPA hydration.
[[redirects]]
  from = "/docs"
  to = "/getting-started"
  status = 301

[[redirects]]
  from = "/docs/getting-started"
  to = "/getting-started"
  status = 301

# SPA fallback: serve index.html with a 404 status for unknown routes so bots
# don't index typos as real pages. The NotFound page still renders client-side.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # CSP unsafe-inline for script-src and style-src is required by the Vite/React
    # build pipeline. Removing it would break hydration and styled components.
    # To eliminate unsafe-inline, the build must support nonce-based CSP, which
    # neither Vite's HTML output nor Netlify headers currently automate.
    # Analytics: When adding Plausible or Fathom, append the analytics domain
    # to script-src (e.g. https://plausible.io) and connect-src below.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://app.kaynos.net https://demo.kaynos.net https://student.kaynos.net https://docs.kaynos.net https://plausible.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto:; upgrade-insecure-requests"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
