# Site: kaynos-site (Foggy Clouds). Custom domain: www.kaynos.net (+ alias kaynos.net).
# DNS lives in the Netlify DNS zone for kaynos.net (NETLIFY records to kaynos-site.netlify.app).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "https://kaynos.net/*"
  to = "https://www.kaynos.net/:splat"
  status = 301
  force = true

# /docs paths exist as React Router client-side <Navigate> redirects in App.jsx;
# mirror them server-side so direct hits 301 instead of relying on SPA hydration.
[[redirects]]
  from = "/docs"
  to = "/getting-started"
  status = 301

[[redirects]]
  from = "/docs/getting-started"
  to = "/getting-started"
  status = 301

# SPA fallback: serve index.html with a 404 status for unknown routes so bots
# don't index typos as real pages. The NotFound page still renders client-side.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Privacy Sandbox / 2024+ directives are denied alongside the classics so
    # any browser that lands on a not-yet-supported permission gets a deny by
    # default rather than the spec's "allow if not specified" fallback.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), browsing-topics=(), attribution-reporting=(), join-ad-interest-group=(), run-ad-auction=(), private-state-token-issuance=(), private-state-token-redemption=(), private-aggregation=(), shared-storage=(), shared-storage-select-url=(), unload=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # script-src drops 'unsafe-inline'. The strict policy with sha256 hashes
    # for inline JSON-LD ships via dist/_headers (generated by
    # scripts/compute-csp.mjs at build time, takes precedence over this
    # global header). This entry is the fallback if _headers fails to
    # generate — it still refuses inline script execution. JSON-LD will
    # also be blocked here, which is loud-fail by design.
    # style-src keeps 'unsafe-inline' for the noscript style attribute and
    # any future critical-CSS inlining; tightening that is a follow-up.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://plausible.io; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://app.kaynos.net https://demo.kaynos.net https://student.kaynos.net https://docs.kaynos.net https://plausible.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Root-level static assets aren't fingerprinted, so they can't be marked
# `immutable` — but they change rarely (favicon, logos, share image, robots,
# manifest). One day cache + must-revalidate keeps them out of the
# every-request hit path without trapping stale copies on legitimate updates.
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/logo.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/logo-mark.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/og-share.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/app-coach-iphone*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
