<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050508" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f8f8fa" media="(prefers-color-scheme: light)" />
  <!-- Block iOS Safari from auto-linking number/date/address-like strings.
       The site has no real phone numbers or addresses; every email link is
       already wrapped in a real <a href="mailto:...">. -->
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
  <!-- Title, description, canonical, OG, and Twitter tags are injected at build time per route. -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <!-- Resource hints for the external origins linked or scripted from
       every page. preconnect for plausible (analytics is requested on
       page load); dns-prefetch for the demo / app / docs links so the
       handshake is cheap if a visitor follows one. -->
  <link rel="preconnect" href="https://plausible.io" crossorigin />
  <link rel="dns-prefetch" href="https://app.kaynos.net" />
  <link rel="dns-prefetch" href="https://demo.kaynos.net" />
  <link rel="dns-prefetch" href="https://student.kaynos.net" />
  <link rel="dns-prefetch" href="https://docs.kaynos.net" />
  <script defer data-domain="kaynos.net" src="https://plausible.io/js/script.tagged-events.js"></script>
</head>

<body>
  <noscript>
    <p
      style="font-family: system-ui, sans-serif; padding: 24px; color: #ccc; background: #050508; min-height: 100vh; margin: 0;">
      This site needs JavaScript enabled. If you opened an HTML file from disk, use the hosted URL instead (Vite apps
      are not loaded from file://).
    </p>
  </noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
