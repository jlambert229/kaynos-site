<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050508" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f8f8fa" media="(prefers-color-scheme: light)" />
  <!-- iOS Add-to-Home-Screen behaviour. apple-mobile-web-app-title controls
       the label under the icon (defaults to <title> truncated). The
       status-bar-style "black-translucent" lets our page extend under
       the status bar — pairs with viewport-fit=cover above and the
       safe-area-inset padding in styles.css. capable=yes opts into the
       standalone launch mode when a user adds the site to their home
       screen on iOS. -->
  <meta name="apple-mobile-web-app-title" content="Kaynos" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Block iOS Safari from auto-linking number/date/address-like strings.
       The site has no real phone numbers or addresses; every email link is
       already wrapped in a real <a href="mailto:...">. -->
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
  <!-- Title, description, canonical, OG, and Twitter tags are injected at build time per route. -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <!-- Resource hints for the external origins linked or scripted from
       every page. preconnect (TCP + TLS) for the two most-likely
       next requests: plausible.io (analytics fires on every load) and
       app.kaynos.net (primary CTA "Start 14-Day Trial" lands on
       /signup). dns-prefetch (lighter — DNS only) for the other
       subdomains that are reachable but less commonly followed. Mobile
       Safari respects this set; opening a fifth preconnect would start
       costing more than it saves. -->
  <link rel="preconnect" href="https://plausible.io" crossorigin />
  <link rel="preconnect" href="https://app.kaynos.net" />
  <link rel="dns-prefetch" href="https://demo.kaynos.net" />
  <link rel="dns-prefetch" href="https://student.kaynos.net" />
  <link rel="dns-prefetch" href="https://docs.kaynos.net" />
  <!-- No SRI: Plausible updates this script without versioning, so a hash
       would break analytics silently. Defensive layer is CSP — script-src
       restricts external scripts to plausible.io only (see netlify.toml +
       dist/_headers). If self-hosting becomes worthwhile, swap the URL
       and bump it manually.

       fetchpriority="low": analytics shouldn't compete for bandwidth with
       the hero LCP image during first paint. Mobile Safari 17.2+ honors
       this attribute; older browsers ignore it harmlessly. defer still
       keeps execution after HTML parse, so DOM-ready ordering is
       unchanged. -->
  <script defer fetchpriority="low" data-domain="kaynos.net" src="https://plausible.io/js/script.tagged-events.js"></script>
</head>

<body>
  <noscript>
    <p
      style="font-family: system-ui, sans-serif; padding: 24px; color: #ccc; background: #050508; min-height: 100vh; margin: 0;">
      This site needs JavaScript enabled. If you opened an HTML file from disk, use the hosted URL instead (Vite apps
      are not loaded from file://).
    </p>
  </noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
