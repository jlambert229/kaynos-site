version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        dependency-type: production
        patterns:
          - "*"
      development-dependencies:
        dependency-type: development
        patterns:
          - "*"
    ignore:
      # Pin major bumps for prerender tooling until build wrapper is re-tested.
      - dependency-name: "vite-prerender-plugin"
        update-types: ["version-update:semver-major"]
